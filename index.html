const esc = (s) => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

  return "⚠️";
}
function matchCause(cause, group){
  if (group==="ทั้งหมด") return true;
  if (group==="เถาวัลย์") return cause.includes("เถาวัลย์");
  if (group==="ต้นไม้") return cause.includes("ต้นไม้");
  if (group==="จรวด/ครอบ") return cause.includes("จรวด")||cause.includes("ครอบ");
  return !cause.includes("เถาวัลย์")&&!cause.includes("ต้นไม้")&&!cause.includes("จรวด")&&!cause.includes("ครอบ");
}
function distKm(a,b){
  const R=6371, toRad=d=>d*Math.PI/180;
  const dLat=toRad(b.lat-a.lat), dLng=toRad(b.lng-a.lng);
  const h=Math.sin(dLat/2)**2+Math.cos(toRad(a.lat))*Math.cos(toRad(b.lat))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}
function optimizeRoute(points, origin){
  if (points.length<=1) return [...points];
  let remaining=[...points];
  let start;
  if(origin){
    // เริ่มจากจุดที่ใกล้ตำแหน่งผู้ใช้ที่สุด
    start=remaining.reduce((a,b)=>distKm(origin,a)<distKm(origin,b)?a:b);
  } else {
    // ไม่มีตำแหน่งผู้ใช้ → เริ่มจากจุดเหนือสุด
    start=remaining.reduce((a,b)=>a.lat>b.lat?a:b);
  }
  const route=[start];
  remaining=remaining.filter(p=>p.id!==start.id);
  while(remaining.length){
    const last=route[route.length-1];
    let best=0;
    for(let i=1;i<remaining.length;i++)
      if(distKm(last,remaining[i])<distKm(last,remaining[best])) best=i;
    route.push(remaining[best]);
    remaining.splice(best,1);
  }
  let improved=true;
  while(improved){
    improved=false;
    for(let i=0;i<route.length-2;i++){
      for(let j=i+2;j<route.length-1;j++){
        const d1=distKm(route[i],route[i+1])+distKm(route[j],route[j+1]);
        const d2=distKm(route[i],route[j])+distKm(route[i+1],route[j+1]);
        if(d2<d1-0.001){
          const rev=route.slice(i+1,j+1).reverse();
          route.splice(i+1,j-i,...rev);
          improved=true;
        }
      }
    }
  }
  return route;
}

function getMyLocation(){
  if(!navigator.geolocation){ geoStatus="unsupported"; render(); return; }
  geoStatus="loading"; render();
  navigator.geolocation.getCurrentPosition(
    pos=>{ userPos={lat:pos.coords.latitude,lng:pos.coords.longitude,acc:pos.coords.accuracy}; geoStatus="ok"; render(); },
    err=>{ geoStatus="err"+err.code; render(); },
    { enableHighAccuracy:true, timeout:12000, maximumAge:30000 }
  );
}
function clearMyLocation(){ userPos=null; geoStatus="idle"; render(); }

function feederStats(){
  const map={};
  tasks.forEach(t=>{
    if(!map[t.feeder]) map[t.feeder]={total:0,done:0,doing:0,pending:0,hasCoord:0};
    map[t.feeder].total++;
    if(t.lat) map[t.feeder].hasCoord++;
    if(t.status==="แก้ไขแล้ว") map[t.feeder].done++;
    else if(t.status==="กำลังแก้ไข") map[t.feeder].doing++;
    else map[t.feeder].pending++;
  });
  return Object.entries(map).sort((a,b)=>(b[1].total-b[1].done)-(a[1].total-a[1].done));
}
function feederCauses(name){
  const list=tasks.filter(t=>t.feeder===name);
  const g=[];
  if(list.some(t=>t.cause.includes("เถาวัลย์"))) g.push("เถาวัลย์");
  if(list.some(t=>t.cause.includes("ต้นไม้"))) g.push("ต้นไม้");
  if(list.some(t=>t.cause.includes("จรวด")||t.cause.includes("ครอบ"))) g.push("จรวด/ครอบ");
  return g;
}

  switchTab("map");
}

// ═══════════ Render: Dashboard ═══════════
function renderDashboard(){
  const total=tasks.length;
  const done=tasks.filter(t=>t.status==="แก้ไขแล้ว").length;
  const doing=tasks.filter(t=>t.status==="กำลังแก้ไข").length;
  const pending=total-done-doing;
  const pct=total?Math.round(done/total*100):0;
  const feeders=feederStats();

  let html=`
    <div class="grid-stats">
      <div class="card"><div class="stat-num">${total}</div><div class="stat-label">ทั้งหมด</div></div>
      <div class="card"><div class="stat-num" style="color:var(--amber)">${pending}</div><div class="stat-label">รอดำเนินการ</div></div>
      <div class="card"><div class="stat-num" style="color:var(--cyan)">${doing}</div><div class="stat-label">กำลังแก้ไข</div></div>
      <div class="card"><div class="stat-num" style="color:var(--green)">${done}</div><div class="stat-label">แก้ไขแล้ว</div></div>
    </div>
    <div class="card" style="margin-bottom:18px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px">
        <span>ความคืบหน้าโดยรวม</span><span style="font-weight:700;color:var(--green)">${pct}%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <h2>🎯 กด Feeder → เลือกสาเหตุ → เด้งไปแผนที่+เส้นทางทันที</h2>
    <p class="hint">ปุ่มสาเหตุจะพาไปหน้าแผนที่ พร้อมวิเคราะห์ลำดับการเดินทางที่สั้นที่สุดให้อัตโนมัติ</p>`;

  feeders.forEach(([name,f],i)=>{
    const remain=f.total-f.done;
    const color=FEEDER_COLOR[name]||"#64748b";
    const causes=feederCauses(name);
    let chips="";
    if(f.hasCoord>0){
      causes.forEach(c=>{
        chips+=`<button class="chip" style="border:1.5px solid ${color}" onclick="gotoMap('${esc(name)}','${c}')">${causeIcon(c)} ${c} → 🗺️</button>`;
      });
      chips+=`<button class="chip chip-all" style="background:${color}" onclick="gotoMap('${esc(name)}','ทั้งหมด')">ทุกจุด + เส้นทาง 🧭</button>`;
    } else {
      chips+=`<span style="font-size:12.5px;color:var(--amber);align-self:center">⚠️ ต้องเก็บพิกัด GPS ก่อนจึงวิเคราะห์เส้นทางได้</span>`;
    }
    chips+=`<button class="chip chip-ghost" onclick="filterFeeder='${esc(name)}';filterStatus='ทั้งหมด';switchTab('tasks')">📋 รายการงาน</button>`;
    html+=`
      <div class="card feeder-card" style="${i===0&&remain>0?'border-color:var(--amber)':''}">
        <div class="feeder-top">
          <div class="rank ${i===0?'top':''}">${i+1}</div>
          <div class="flex1">
            <div style="font-weight:600;font-size:14px"><span class="dot" style="background:${color}"></span>${esc(name)}</div>
            <div style="font-size:12px;color:var(--muted)">ค้าง ${remain} งาน · เสร็จ ${f.done}/${f.total}${f.hasCoord===0?' · ⚠️ ยังไม่มีพิกัด':''}</div>
          </div>
        </div>
        <div class="chips">${chips}</div>
      </div>`;
  });
  document.getElementById("page-dashboard").innerHTML=html;
}

// ═══════════ Render: Tasks ═══════════
function renderTasks(){
  const feeders=feederStats();
  const filtered=tasks.filter(t=>
    (filterFeeder==="ทั้งหมด"||t.feeder===filterFeeder)&&
    (filterStatus==="ทั้งหมด"||t.status===filterStatus));

  let html=`
    <div class="filters">
      <select id="fFeeder" onchange="filterFeeder=this.value;render()">
        <option${filterFeeder==="ทั้งหมด"?" selected":""}>ทั้งหมด</option>
        ${feeders.map(([n])=>`<option${filterFeeder===n?" selected":""}>${esc(n)}</option>`).join("")}
      </select>
      <select id="fStatus" onchange="filterStatus=this.value;render()">
        <option${filterStatus==="ทั้งหมด"?" selected":""}>ทั้งหมด</option>
        ${STATUS_LIST.map(s=>`<option${filterStatus===s?" selected":""}>${s}</option>`).join("")}
      </select>
      <span style="margin-left:auto;font-size:13px;color:var(--muted)">แสดง ${filtered.length} รายการ</span>
    </div>`;

  filtered.forEach(t=>{
    const st=STATUS_STYLE[t.status];
    const open=expandedId===t.id;
    html+=`
      <div class="card task ${open?'open':''}" style="padding:0">
        <div class="task-head" onclick="expandedId=(expandedId===${t.id}?null:${t.id});render()">
          <span class="task-icon">${causeIcon(t.cause)}</span>
          <div class="flex1">
            <div class="task-title">${esc(t.cause)}</div>
            <div class="task-sub">${esc(t.feeder)} · พบเมื่อ ${t.date}</div>
          </div>
          ${t.lat?`<button class="btn-map" onclick="event.stopPropagation();gotoMap('${esc(t.feeder)}','ทั้งหมด',${t.id})">📍 ดูบนแผนที่</button>`:""}
          <span class="badge" style="background:${st.bg};color:${st.color}">
            <span class="d" style="background:${st.color}"></span>${t.status}
          </span>
          <span style="color:var(--muted);font-size:12px">${open?"▲":"▼"}</span>
        </div>
        <div class="task-body">
          <div class="form-grid">
            <div>
              <label>สถานะ</label>
              <select style="width:100%" onchange="updateTask(${t.id},'status',this.value)">
                ${STATUS_LIST.map(s=>`<option${t.status===s?" selected":""}>${s}</option>`).join("")}
              </select>
            </div>
            <div>
              <label>ผู้รับผิดชอบ</label>
              <select style="width:100%" onchange="updateTask(${t.id},'responsible',this.value)">
                ${RESPONSIBLE_LIST.map(r=>`<option${t.responsible===r?" selected":""}>${r}</option>`).join("")}
              </select>
            </div>
          </div>
          <div style="margin-top:12px">
            <label>บันทึกเพิ่มเติม</label>
            <input type="text" style="width:100%" value="${esc(t.note)}" placeholder="เช่น วัสดุที่ต้องเบิก, ต้องดับไฟ..."
              onchange="updateTask(${t.id},'note',this.value)">
          </div>
          ${t.lat?`<a class="btn-nav" style="margin-top:12px" href="${navUrl(t)}" target="_blank">🧭 นำทางไปจุดนี้ (${t.lat.toFixed(5)}, ${t.lng.toFixed(5)})</a>`:""}
        </div>
      </div>`;
  });
  document.getElementById("page-tasks").innerHTML=html;
}
function updateTask(id,field,value){
  const t=tasks.find(x=>x.id===id);
  if(t){ t[field]=value; persist(); render(); }
}

// ═══════════ Render: Map + Route ═══════════
function renderMap(){
  const feeders=feederStats();
  const pts=tasks.filter(t=>t.lat&&t.lng&&
    (mapFeeder==="ทั้งหมด"||t.feeder===mapFeeder)&&matchCause(t.cause,mapCause));
  const route=optimizeRoute(pts, userPos);
  const legs=[];
  for(let i=0;i<route.length-1;i++) legs.push(distKm(route[i],route[i+1]));
  const firstLeg=(userPos&&route.length)?distKm(userPos,route[0]):null;
  const totalKm=legs.reduce((a,b)=>a+b,0)+(firstLeg||0);
  const noCoord=tasks.filter(t=>!t.lat);
  const fullRouteUrl=route.length
    ?(userPos
      ?"https://www.google.com/maps/dir/"+userPos.lat+","+userPos.lng+"/"+route.map(p=>`${p.lat},${p.lng}`).join("/")
      :"https://www.google.com/maps/dir/"+route.map(p=>`${p.lat},${p.lng}`).join("/"))
    :"#";

  // ── สถานะ GPS ──
  let geoMsg="";
  if(geoStatus==="loading") geoMsg=`<span style="color:var(--cyan)">⏳ กำลังค้นหาตำแหน่ง...</span>`;
  else if(geoStatus==="ok"&&userPos) geoMsg=`<span style="color:var(--green)">✅ ได้ตำแหน่งแล้ว (${userPos.lat.toFixed(5)}, ${userPos.lng.toFixed(5)}${userPos.acc?` ±${Math.round(userPos.acc)}ม.`:""})</span>`;
  else if(geoStatus==="err1") geoMsg=`<span style="color:var(--amber)">⚠️ ถูกปฏิเสธ — กรุณาอนุญาตการเข้าถึงตำแหน่งในเบราว์เซอร์</span>`;
  else if(geoStatus==="err2"||geoStatus==="err3") geoMsg=`<span style="color:var(--amber)">⚠️ หาตำแหน่งไม่สำเร็จ — ลองใหม่ในที่โล่ง หรือเปิด GPS</span>`;
  else if(geoStatus==="unsupported") geoMsg=`<span style="color:var(--amber)">⚠️ เบราว์เซอร์นี้ไม่รองรับ GPS</span>`;

  let html=`
    <div class="filters">
      <select onchange="mapFeeder=this.value;highlightId=null;render()">
        <option${mapFeeder==="ทั้งหมด"?" selected":""}>ทั้งหมด</option>
        ${feeders.filter(([,f])=>f.hasCoord>0).map(([n])=>`<option${mapFeeder===n?" selected":""}>${esc(n)}</option>`).join("")}
      </select>
      <div class="cause-filters">
        ${CAUSE_GROUPS.map(c=>`<button class="cf ${mapCause===c?'active':''}" onclick="mapCause='${c}';highlightId=null;render()">${c==="ทั้งหมด"?c:causeIcon(c)+" "+c}</button>`).join("")}
      </div>
    </div>
    <div class="card" style="margin-bottom:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <button class="btn-nav" style="background:${userPos?'var(--green)':'var(--cyan)'}" onclick="getMyLocation()">
        📍 ${userPos?'อัปเดตตำแหน่งของฉัน':'ใช้ตำแหน่งของฉันเป็นจุดเริ่ม'}
      </button>
      ${userPos?`<button class="chip chip-ghost" onclick="clearMyLocation()">✕ ยกเลิก ใช้จุดเหนือสุดแทน</button>`:""}
      <span style="font-size:12.5px">${geoMsg||`<span style="color:var(--muted)">กดปุ่มเพื่อให้เส้นทางเริ่มจากจุดที่คุณอยู่จริง</span>`}</span>
    </div>`;

  if(!pts.length){
    html+=`<div class="card" style="padding:30px;text-align:center;color:var(--muted)">ไม่พบจุดที่มีพิกัดตามเงื่อนไขนี้ — ลองเปลี่ยนตัวกรอง Feeder หรือสาเหตุ</div>`;
  } else {
    // ── Route banner ──
    html+=`
      <div class="route-banner">
        <div class="flex1">
          <div style="font-weight:700;font-size:14px;color:var(--cyan)">🧭 วิเคราะห์เส้นทางแล้ว: ${pts.length} จุด${userPos?' · เริ่มจากตำแหน่งของคุณ':''}</div>
          <div style="font-size:12.5px;color:#cbd5e1">ระยะทางรวม (เส้นตรง) ≈ <b>${totalKm.toFixed(1)} กม.</b>${userPos?` · จากคุณ → จุดแรก ${firstLeg.toFixed(1)} กม.`:' · เริ่มจุดเหนือสุด → ไล่จุดใกล้ที่สุดต่อเนื่อง'}</div>
        </div>
        <a class="btn-nav" style="font-weight:800" href="${fullRouteUrl}" target="_blank">เปิดเส้นทางทั้งหมดใน Google Maps →</a>
      </div>`;

    // ── SVG ──
    const allLats=pts.map(p=>p.lat), allLngs=pts.map(p=>p.lng);
    if(userPos){ allLats.push(userPos.lat); allLngs.push(userPos.lng); }
    const minLat=Math.min(...allLats)-0.006, maxLat=Math.max(...allLats)+0.006;
    const minLng=Math.min(...allLngs)-0.006, maxLng=Math.max(...allLngs)+0.006;
    const W=640, H=460;
    const X=lng=>((lng-minLng)/Math.max(maxLng-minLng,0.0001))*(W-70)+35;
    const Y=lat=>H-(((lat-minLat)/Math.max(maxLat-minLat,0.0001))*(H-70)+35);

    let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
    for(let i=0;i<7;i++) svg+=`<line x1="${W/7*(i+.5)}" y1="0" x2="${W/7*(i+.5)}" y2="${H}" stroke="#243044"/>`;
    for(let i=0;i<6;i++) svg+=`<line x1="0" y1="${H/6*(i+.5)}" x2="${W}" y2="${H/6*(i+.5)}" stroke="#243044"/>`;
    svg+=`<text x="${W-26}" y="26" fill="#94a3b8" font-size="15" font-weight="700">N ↑</text>`;
    // เส้นจากตำแหน่งผู้ใช้ → จุดแรก
    if(userPos&&route.length){
      svg+=`<line x1="${X(userPos.lng)}" y1="${Y(userPos.lat)}" x2="${X(route[0].lng)}" y2="${Y(route[0].lat)}" stroke="#4ade80" stroke-width="2.5" stroke-dasharray="3 5" opacity="0.9"/>`;
      svg+=`<text x="${(X(userPos.lng)+X(route[0].lng))/2}" y="${(Y(userPos.lat)+Y(route[0].lat))/2-5}" text-anchor="middle" fill="#86efac" font-size="9.5" font-weight="700">${firstLeg.toFixed(1)} กม.</text>`;
    }
    for(let i=0;i<route.length-1;i++){
      svg+=`<line x1="${X(route[i].lng)}" y1="${Y(route[i].lat)}" x2="${X(route[i+1].lng)}" y2="${Y(route[i+1].lat)}" stroke="#4ac3f0" stroke-width="2" stroke-dasharray="6 4" opacity="0.8"/>`;
      svg+=`<text x="${(X(route[i].lng)+X(route[i+1].lng))/2}" y="${(Y(route[i].lat)+Y(route[i+1].lat))/2-5}" text-anchor="middle" fill="#7dd3fc" font-size="9.5">${legs[i].toFixed(1)} กม.</text>`;
    }
    route.forEach((p,i)=>{
      const hl=highlightId===p.id;
      svg+=`<g style="cursor:pointer" onclick="window.open('${navUrl(p)}','_blank')">`;
      if(hl) svg+=`<circle cx="${X(p.lng)}" cy="${Y(p.lat)}" r="18" fill="none" stroke="#f5b942" stroke-width="2.5"><animate attributeName="r" values="14;20;14" dur="1.5s" repeatCount="indefinite"/></circle>`;
      svg+=`<circle cx="${X(p.lng)}" cy="${Y(p.lat)}" r="12" fill="${(i===0&&!userPos)?'#4ade80':(FEEDER_COLOR[p.feeder]||'#94a3b8')}" stroke="#0f1419" stroke-width="2"/>`;
      svg+=`<text x="${X(p.lng)}" y="${Y(p.lat)+4}" text-anchor="middle" fill="#0f1419" font-size="11" font-weight="800">${i+1}</text>`;
      svg+=`<text x="${X(p.lng)}" y="${Y(p.lat)-17}" text-anchor="middle" font-size="11">${causeIcon(p.cause)}</text>`;
      svg+=`</g>`;
    });
    // หมุดตำแหน่งผู้ใช้
    if(userPos){
      svg+=`<g>
        <circle cx="${X(userPos.lng)}" cy="${Y(userPos.lat)}" r="16" fill="#4ade80" opacity="0.2">
          <animate attributeName="r" values="12;20;12" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="${X(userPos.lng)}" cy="${Y(userPos.lat)}" r="8" fill="#4ade80" stroke="#0f1419" stroke-width="2.5"/>
        <text x="${X(userPos.lng)}" y="${Y(userPos.lat)-14}" text-anchor="middle" fill="#86efac" font-size="11" font-weight="800">📍 คุณอยู่ที่นี่</text>
      </g>`;
    }
    svg+=`</svg>`;
    html+=`<div class="svg-wrap">${svg}</div>
      <div class="footnote">* หมายเลข = ลำดับการเดินทางที่แนะนำ${userPos?' (🟢 จุดกะพริบ = ตำแหน่งของคุณ)':' (จุด 1 สีเขียว = จุดเริ่ม)'} — กดหมุดเพื่อนำทาง</div>
      <h2 style="font-size:14px;margin-top:18px">📍 ลำดับการเดินทางที่แนะนำ</h2>`;

    // แถวจุดเริ่ม = ตำแหน่งผู้ใช้
    if(userPos){
      html+=`
        <div class="card stop" style="border-color:var(--green)">
          <div class="stop-num" style="background:var(--green)">🏁</div>
          <div class="flex1">
            <div style="font-size:13.5px;font-weight:600">จุดเริ่มต้น: ตำแหน่งของคุณ</div>
            <div style="font-size:11.5px;color:var(--muted)">${userPos.lat.toFixed(5)}, ${userPos.lng.toFixed(5)} → ไปจุดที่ 1 ระยะ ${firstLeg.toFixed(1)} กม.</div>
          </div>
        </div>`;
    }

    route.forEach((p,i)=>{
      const hl=highlightId===p.id;
      const firstDist=(i===0&&userPos)?` · ห่างจากคุณ ${firstLeg.toFixed(1)} กม.`:"";
      html+=`
        <div class="card stop" style="${hl?'border-color:var(--amber);background:#2b3a24':''}">
          <div class="stop-num" style="background:${(i===0&&!userPos)?'#4ade80':(FEEDER_COLOR[p.feeder]||'#64748b')}">${i+1}</div>
          <div class="flex1">
            <div style="font-size:13.5px;font-weight:600">${causeIcon(p.cause)} ${esc(p.cause)}</div>
            <div style="font-size:11.5px;color:var(--muted)">${esc(p.feeder)}${firstDist}${i>0?` · ห่างจุดก่อนหน้า ${legs[i-1].toFixed(1)} กม.`:""}</div>
          </div>
          <a class="btn-nav" style="padding:6px 13px;font-size:12.5px" href="${navUrl(p)}" target="_blank">นำทาง 🧭</a>
        </div>`;
    });
  }

  if(noCoord.length){
    html+=`<div class="note-warn">⚠️ มี <b>${noCoord.length} จุด</b> ที่ยังไม่มีพิกัด (Feeder นิคมอุตสาหกรรม RIU01/RIU02) — แนะนำให้เก็บพิกัด GPS เมื่อลงพื้นที่ครั้งถัดไป</div>`;
  }
  document.getElementById("page-map").innerHTML=html;
}

// ═══════════ Master render ═══════════
function render(){
  if(currentTab==="dashboard") renderDashboard();
  else if(currentTab==="tasks") renderTasks();
  else renderMap();
}
render();
</script>
</body>
</html>
